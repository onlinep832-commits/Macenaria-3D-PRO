<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Esqueci minha senha</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #forgot-box { background: #fff; padding: 32px 24px; border-radius: 8px; box-shadow: 0 2px 8px #0001; min-width: 300px; }
        input { display: block; width: 100%; margin-bottom: 12px; padding: 8px; font-size: 16px; }
        button { width: 100%; padding: 10px; background: #3498db; color: #fff; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        #forgot-erro { color: #e74c3c; margin-bottom: 8px; }
        #forgot-ok { color: #27ae60; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div id="forgot-box">
        <h2>Esqueci minha senha</h2>
        <form id="form-forgot">
            <input type="email" id="forgot-email" placeholder="Seu e-mail" required />
            <button type="submit">Enviar link de recuperação</button>
        </form>
        <div id="forgot-erro"></div>
        <div id="forgot-ok"></div>
        <a href="login.html">Voltar ao login</a>
    </div>
    <script>
    document.getElementById('form-forgot').onsubmit = async function(e) {
        e.preventDefault();
        document.getElementById('forgot-erro').innerText = '';
        document.getElementById('forgot-ok').innerText = '';
        const email = document.getElementById('forgot-email').value;
        try {
            const resp = await fetch('https://seudominio-backend.onrender.com/api/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await resp.json();
            if (data.ok) {
                document.getElementById('forgot-ok').innerText = 'Se o e-mail existir, um link de recuperação foi enviado.';
            } else {
                document.getElementById('forgot-erro').innerText = data.error || 'Erro ao enviar e-mail.';
            }
        } catch (err) {
            document.getElementById('forgot-erro').innerText = 'Erro de conexão.';
        }
    };
    </script>
</body>
</html>
